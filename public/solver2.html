<!DOCTYPE html>
<html><body>
<div id="out">Processing...</div>
<script>
  const IMG_URL = '/assets/skybox/cloud_test.png';
  const img = new Image();
  img.src = IMG_URL;
  img.onload = () => {
    const s = img.width / 3;
    const faces = [];
    const canvas = document.createElement('canvas');
    canvas.width = s; canvas.height = s;
    const ctx = canvas.getContext('2d');
    
    for(let y=0; y<2; y++) {
      for(let x=0; x<3; x++) {
        ctx.drawImage(img, x*s, y*s, s, s, 0, 0, s, s);
        const data = ctx.getImageData(0,0,s,s).data;
        faces.push({ id: x + ',' + y, data });
      }
    }

    function getEdge(data, edge) { // top, bottom, left, right
      const res = [];
      if (edge === 'top') {
        for(let i=0; i<s; i++) { res.push(data[(i)*4], data[(i)*4+1], data[(i)*4+2]); }
      } else if (edge === 'bottom') {
        for(let i=0; i<s; i++) { const o = ((s-1)*s + i)*4; res.push(data[o], data[o+1], data[o+2]); }
      } else if (edge === 'left') {
        for(let i=0; i<s; i++) { const o = (i*s)*4; res.push(data[o], data[o+1], data[o+2]); }
      } else if (edge === 'right') {
        for(let i=0; i<s; i++) { const o = (i*s + s-1)*4; res.push(data[o], data[o+1], data[o+2]); }
      }
      return res;
    }

    function diff(e1, e2) {
      let d = 0;
      for(let i=0; i<e1.length; i++) d += Math.abs(e1[i]-e2[i]);
      return d / (e1.length/3);
    }

    const report = [];
    for(let i=0; i<faces.length; i++) {
        const f1 = faces[i];
        const rightEdge = getEdge(f1.data, 'right');
        const bottomEdge = getEdge(f1.data, 'bottom');
        
        let bestRight = null, bestRightScore = 999999;
        let bestBottom = null, bestBottomScore = 999999;

        for(let j=0; j<faces.length; j++) {
            if (i===j) continue;
            const f2 = faces[j];
            const leftEdge2 = getEdge(f2.data, 'left');
            const topEdge2 = getEdge(f2.data, 'top');
            
            const dr = diff(rightEdge, leftEdge2);
            if (dr < bestRightScore) { bestRightScore = dr; bestRight = f2.id; }

            const db = diff(bottomEdge, topEdge2);
            if (db < bestBottomScore) { bestBottomScore = db; bestBottom = f2.id; }
        }
        report.push(f1.id + " Right -> " + bestRight + " (score: " + Math.round(bestRightScore) + ")");
        report.push(f1.id + " Bottom -> " + bestBottom + " (score: " + Math.round(bestBottomScore) + ")");
    }
    document.getElementById('out').innerText = report.join('\n');
  };
</script>
</body></html>
