name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Targeting .NET 10 to support backend compilation

      - name: Install Node Dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Pre-Flight Integrity Check (TypeScript Validation)
        run: npm run type-check

      - name: Build backend
        run: npm run build:backend

      - name: Obfuscate Node Backend & Package with electron-builder
        run: npx javascript-obfuscator main.js --output build-temp/main.js --compact true --control-flow-flattening true --string-array true --string-array-encoding base64 && npx electron-builder --config electron-builder.config.cjs --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
